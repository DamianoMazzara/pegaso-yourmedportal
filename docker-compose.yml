services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: "3001"
    env_file:
      - .env
    ports:
      - "3001:3001"
    networks:
      - dokploy-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    env_file:
      - .env
    ports:
      - "3002:3002"
    depends_on:
      - api
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
    name: dokploy-network
